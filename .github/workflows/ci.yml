name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: >-
          pulse-spatial examples/cold_chain_geofence.pulse
          --scenario EmergencyReroute

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e .[test]
      - run: python -m unittest discover -s tests -v
      - run: >-
          pulse-spatial examples/cold_chain_geofence.pulse
          --scenario EmergencyReroute
          --validate-projections
      - run: >-
          pulse-spatial-ibtracs
          --data experiments/ibtracs/snapshots/ibtracs-last3years-main-2026-07-16.csv
          --repetitions 1
          --require-parity
      - run: >-
          pulse-spatial-spatiotemporal
          --data experiments/ibtracs/snapshots/ibtracs-last3years-main-2026-07-16.csv
          --repetitions 1
          --require-parity
      - run: >-
          pulse-spatial-composition
          --repetitions 1
          --require-equivalence
      - run: >-
          pulse-spatial-topology-corpus
          --require-parity
      - run: pulse-spatial-semantic-sensitivity --require-all-distinguished
      - run: pulse-spatial-end-to-end --require-all-checks
      - run: pulse-spatial-formal-properties --max-depth 4
      - run: pulse-spatial-scalability --sizes 100,1000 --repetitions 1

  external-geosparql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: >-
          docker build --quiet
          --tag pulse-jena-geosparql:6.1.0
          external/jena-geosparql
      - run: pulse-spatial-geosparql-external --require-parity

  lean-formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: formal/lean
          build: true
          test: false
          leanchecker: true

  persistent-postgis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[test]
      - run: >-
          pulse-spatial-postgis
          --data experiments/ibtracs/snapshots/ibtracs-last3years-main-2026-07-16.csv
          --require-parity
